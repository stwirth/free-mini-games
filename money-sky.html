<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Money Sky</title>
  <style>
    :root {
      --bg: #dff6ff;
      --panel: #f9feff;
      --text: #11324d;
      --accent: #0ea5a6;
      --accent-2: #16a34a;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(160deg, #bae6fd 0%, #d9f99d 52%, #a7f3d0 100%);
      color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      padding: 1rem;
    }

    .page-layout {
      max-width: 980px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: minmax(0, 560px) 280px;
      gap: 1rem;
      align-items: start;
    }

    .game-shell {
      width: min(100%, 560px);
      background: var(--panel);
      border: 2px solid #86d4e3;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
      padding: 1rem;
    }

    h1 {
      margin: 0 0 0.8rem;
      color: var(--accent);
      font-size: 1.6rem;
      font-weight: 800;
      text-align: center;
    }

    .hud {
      display: flex;
      gap: 0.75rem;
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 0.8rem;
    }

    .hud-item {
      background: #ecfeff;
      border: 2px solid #67e8f9;
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      flex: 1;
      text-align: center;
    }

    canvas {
      width: 100%;
      max-width: 520px;
      aspect-ratio: 13 / 16;
      display: block;
      margin: 0 auto;
      border: 3px solid #0891b2;
      border-radius: 12px;
      background: var(--bg);
      touch-action: none;
    }

    .controls {
      margin-top: 0.8rem;
      font-size: 0.85rem;
      line-height: 1.6;
      text-align: center;
      color: #0f4c5c;
    }

    .back-link {
      display: inline-block;
      margin-top: 0.75rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .model-info {
      margin-top: 0.65rem;
      text-align: center;
      font-size: 0.75rem;
      color: #2d6472;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .sidebar {
      background: var(--panel);
      border: 2px solid #86d4e3;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      padding: 0.8rem;
      position: sticky;
      top: 1rem;
    }

    .sidebar h2 {
      margin: 0 0 0.6rem;
      color: var(--accent);
      font-size: 1rem;
      font-weight: 700;
    }

    .sidebar ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 0.55rem;
    }

    .sidebar li {
      font-size: 0.82rem;
      line-height: 1.45;
      color: #175b66;
    }

    .sidebar a {
      color: #0a7f82;
      text-decoration: none;
    }

    .sidebar a:hover {
      text-decoration: underline;
    }

    @media (max-width: 930px) {
      .page-layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <div class="page-layout">
    <main class="game-shell">
      <h1>Money Sky</h1>
      <section class="hud" aria-label="Game information">
        <div class="hud-item">Score: <span id="score">0</span></div>
        <div class="hud-item">State: <span id="state">Flying</span></div>
      </section>
      <canvas id="game" width="260" height="320" aria-label="Money Sky game"></canvas>
      <p class="controls">Move with arrow keys. On touch devices, swipe to dash. Collect 🪙 for points, avoid ⛰️, and don't leave the screen.</p>
      <p class="model-info">Model used: GPT-5.5</p>
      <a class="back-link" href="./index.html">← Back to game list</a>
      <p id="announce" class="sr-only" aria-live="polite"></p>
    </main>

    <aside class="sidebar" aria-label="History">
      <h2>History</h2>
      <ul>
        <li>Add top-down Money Sky with rolling obstacles, coins, and swipe controls (<a href="https://github.com/stwirth/free-mini-games/issues/19" target="_blank" rel="noopener">#19</a>)</li>
      </ul>
    </aside>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const stateEl = document.getElementById("state");
    const announceEl = document.getElementById("announce");

    const MAX_DELTA_TIME = 1 / 30;
    const PLAYER_SIZE = 30;
    const PLAYER_SPEED = 120;
    const SWIPE_STEP = 26;
    const ITEM_SIZE = 28;
    const MIN_SCROLL_SPEED = 44;
    const SPEED_VARIANCE = 28;

    const world = {
      width: canvas.width,
      height: canvas.height,
      score: 0,
      gameOver: false,
      lostReason: "",
      spawnTimer: 0,
      spawnInterval: 0.6,
      backgroundOffset: 0,
      items: [],
      player: {
        x: canvas.width / 2 - PLAYER_SIZE / 2,
        y: canvas.height - PLAYER_SIZE - 12,
        width: PLAYER_SIZE,
        height: PLAYER_SIZE
      }
    };

    const keys = new Set();
    const touchState = { startX: 0, startY: 0 };

    addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      if (["arrowleft", "arrowright", "arrowup", "arrowdown"].includes(key)) {
        event.preventDefault();
      }
      keys.add(key);
    });
    addEventListener("keyup", (event) => keys.delete(event.key.toLowerCase()));

    canvas.addEventListener("touchstart", (event) => {
      const touch = event.changedTouches[0];
      touchState.startX = touch.clientX;
      touchState.startY = touch.clientY;
      event.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", (event) => {
      if (world.gameOver) return;
      const touch = event.changedTouches[0];
      const dx = touch.clientX - touchState.startX;
      const dy = touch.clientY - touchState.startY;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 14) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        world.player.x += dx > 0 ? SWIPE_STEP : -SWIPE_STEP;
      } else {
        world.player.y += dy > 0 ? SWIPE_STEP : -SWIPE_STEP;
      }
      event.preventDefault();
    }, { passive: false });

    function overlaps(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function spawnItem() {
      const obstacle = Math.random() < 0.45;
      world.items.push({
        x: Math.floor(Math.random() * (world.width - ITEM_SIZE)),
        y: -ITEM_SIZE - 2,
        width: ITEM_SIZE,
        height: ITEM_SIZE,
        speed: MIN_SCROLL_SPEED + Math.random() * SPEED_VARIANCE,
        obstacle
      });
    }

    function lose(reason) {
      world.gameOver = true;
      world.lostReason = reason;
      stateEl.textContent = "Lost";
      announceEl.textContent = `${reason} Final score: ${world.score}.`;
    }

    function resetGame() {
      world.score = 0;
      world.gameOver = false;
      world.lostReason = "";
      world.spawnTimer = 0;
      world.backgroundOffset = 0;
      world.items = [];
      world.player.x = canvas.width / 2 - PLAYER_SIZE / 2;
      world.player.y = canvas.height - PLAYER_SIZE - 12;
      scoreEl.textContent = "0";
      stateEl.textContent = "Flying";
      announceEl.textContent = "";
    }

    function update(dt) {
      if (world.gameOver) return;

      const moveX = (keys.has("arrowright") ? 1 : 0) - (keys.has("arrowleft") ? 1 : 0);
      const moveY = (keys.has("arrowdown") ? 1 : 0) - (keys.has("arrowup") ? 1 : 0);
      const previousX = world.player.x;
      const previousY = world.player.y;
      world.player.x += moveX * PLAYER_SPEED * dt;
      world.player.y += moveY * PLAYER_SPEED * dt;

      world.backgroundOffset = (world.backgroundOffset + 48 * dt) % 48;

      world.spawnTimer += dt;
      if (world.spawnTimer >= world.spawnInterval) {
        world.spawnTimer -= world.spawnInterval;
        spawnItem();
      }

      for (const item of world.items) {
        item.y += item.speed * dt;
      }
      world.items = world.items.filter((item) => item.y <= world.height + item.height);

      for (const item of world.items) {
        if (!overlaps(world.player, item)) continue;
        if (item.obstacle) {
          world.player.x = previousX;
          world.player.y = previousY;
        } else {
          world.score += 1;
          scoreEl.textContent = String(world.score);
          item.collected = true;
        }
      }
      world.items = world.items.filter((item) => !item.collected);

      if (
        world.player.x + world.player.width < 0 ||
        world.player.x > world.width ||
        world.player.y + world.player.height < 0 ||
        world.player.y > world.height
      ) {
        lose("You flew out of bounds.");
      }
    }

    function drawSky() {
      const grad = ctx.createLinearGradient(0, 0, 0, world.height);
      grad.addColorStop(0, "#93c5fd");
      grad.addColorStop(1, "#67e8f9");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, world.width, world.height);

      ctx.fillStyle = "rgba(255, 255, 255, 0.75)";
      for (let y = -48; y < world.height + 48; y += 48) {
        ctx.fillRect(0, y + world.backgroundOffset, world.width, 1.5);
      }
    }

    function drawItems() {
      ctx.font = `${ITEM_SIZE}px system-ui, sans-serif`;
      ctx.textBaseline = "top";
      for (const item of world.items) {
        ctx.fillText(item.obstacle ? "⛰️" : "🪙", item.x, item.y);
      }
    }

    function drawPlayer() {
      ctx.font = `${PLAYER_SIZE}px system-ui, sans-serif`;
      ctx.textBaseline = "top";
      ctx.fillText("🚁", world.player.x, world.player.y);
    }

    function drawGameOver() {
      if (!world.gameOver) return;
      ctx.fillStyle = "rgba(0, 0, 0, 0.4)";
      ctx.fillRect(0, 0, world.width, world.height);
      const panelW = 210;
      const panelH = 88;
      const panelX = (world.width - panelW) / 2;
      const panelY = (world.height - panelH) / 2;
      ctx.fillStyle = "rgba(249, 254, 255, 0.96)";
      ctx.beginPath();
      ctx.roundRect(panelX, panelY, panelW, panelH, 12);
      ctx.fill();

      ctx.fillStyle = "#0f766e";
      ctx.font = "bold 18px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText("💥 Game Over", world.width / 2, world.height / 2 - 16);
      ctx.fillStyle = "#164e63";
      ctx.font = "15px system-ui, sans-serif";
      ctx.fillText(`Score: ${world.score} 🪙`, world.width / 2, world.height / 2 + 14);
    }

    function draw() {
      drawSky();
      drawItems();
      drawPlayer();
      drawGameOver();
    }

    let last = performance.now();
    function frame(now) {
      const dt = Math.min((now - last) / 1000, MAX_DELTA_TIME);
      last = now;
      update(dt);
      draw();
      requestAnimationFrame(frame);
    }

    resetGame();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
